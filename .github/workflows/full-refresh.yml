name: Weekly Full Refresh

on:
  schedule:
    # 每周日北京时间 02:00 (UTC 周六 18:00)
    - cron: "0 18 * * 6"
  workflow_dispatch: {}  # 手动触发

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx aiofiles

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data.db
          key: a-share-db-${{ github.run_id }}
          restore-keys: |
            a-share-db-

      - name: Fetch stock codes
        run: python fetch_codes.py

      - name: Fetch industries
        run: python fetch_industries.py

      - name: Fetch PB ratios
        run: python fetch_pb.py

      - name: Fetch all financial data
        run: |
          export A_SHARE_DB_PATH="${{ github.workspace }}/data.db"
          python cli.py refresh --force --years 2022,2023,2024,2025

      - name: Export dashboard data
        run: |
          export A_SHARE_DB_PATH="${{ github.workspace }}/data.db"
          python cli.py export --format json -o dashboard/data.json --years 2022,2023,2024,2025

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add all_codes.txt industry.json pb_cache.json dashboard/data.json dashboard/data.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "weekly: full data refresh $(date +%Y-%m-%d)"
            git push
          fi
